<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponsors</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

</head>
<body>
        <nav class="navbar navbar-expand-sm navbar-dark text-right">
        <button type="button" class="btn btn-primary btn-xl" id="logoutBtn">LogOut</button>
    </nav>
    <div class="container-fluid">
        <div class="jumbotron">
            <h1 class="display-3">Sponsors</h1>
            <p class="lead">Gestão de Sponsors da WebApp</p>
            <hr class="my-2">
            <form id="frmSpeaker">
                <div class="row">
                <div class="form-group col">
                    <label for="txtName">Nome</label>
                    <input id="txtName" type="text" placeholder="nome" class="form-control" required>
                </div>
                <div class="form-group col">
                    
                    <label for="txtJob">Logo</label>
                    <input id="txtJob" type="text" placeholder="logo" class="form-control" required>
                </div>
                </div>
                <div class="form-group">
                    <label for="txtPhoto">Foto</label>
                    <input type="url" id="txtPhoto" placeholder="link da foto" class="form-control">
                </div>
                <div class="row">
                
            <div class="form-row">
                <div class="form-group col-md-12">
                    <button type="submit" class="btn btn-primary mb-2" >Guardar Alterações</button>
                    <button type="reset" class="btn btn-primary mb-2">Limpar Tudo</button>
                </div>
            </div>
        </form>
            <div id="divSponsors" class="container">
                <div class="table-responsive">
                    <table id="tblSponsors" class="table table-sm">
                        <!-- Preencher via JS -->
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/7.26.9/sweetalert2.all.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
    <script src="../js/autores.js"></script>
</body>
</html>
